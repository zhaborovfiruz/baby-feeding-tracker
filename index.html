<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ПрикормТрекер :: реакция + списки продуктов</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f4f7fc;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      padding: 24px 16px;
      color: #1a2c3e;
    }
    .app-container {
      max-width: 1200px;
      margin: 0 auto;
    }
    /* две колонки для главного контента после формы */
    .two-columns {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .left-col {
      flex: 2;
      min-width: 280px;
    }
    .right-col {
      flex: 1.2;
      min-width: 260px;
    }
    .card {
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.03);
      padding: 1.5rem;
      margin-bottom: 1.75rem;
      border: 1px solid rgba(0, 0, 0, 0.03);
    }
    h1 {
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #2b7a4b, #3e9f6b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    h1 i {
      background: none;
      color: #3e9f6b;
    }
    .subhead {
      color: #5f7f6e;
      font-weight: 400;
      margin-top: 6px;
      font-size: 0.9rem;
      border-left: 3px solid #cbe5d4;
      padding-left: 12px;
    }
    .stats-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .stat-badge {
      background: #eef3ec;
      border-radius: 60px;
      padding: 8px 20px;
      font-weight: 500;
      font-size: 0.9rem;
      color: #2c5a3e;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .form-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
    }
    .input-group {
      flex: 1;
      min-width: 130px;
    }
    .input-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #5c7a6a;
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      font-size: 0.95rem;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      background: white;
      font-family: inherit;
      transition: 0.2s;
      outline: none;
    }
    input:focus, select:focus {
      border-color: #7dcd9e;
      box-shadow: 0 0 0 3px rgba(61, 167, 98, 0.15);
    }
    .reaction-group {
      display: flex;
      gap: 20px;
      align-items: center;
      background: #f9fdfa;
      padding: 8px 16px;
      border-radius: 40px;
    }
    .reaction-option {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    .reaction-option input {
      width: 18px;
      height: 18px;
      accent-color: #2b7a4b;
    }
    .good-label {
      color: #2c7a4d;
    }
    .bad-label {
      color: #c46b5e;
    }
    .button-group {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    button {
      border: none;
      background: #eef2f5;
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }
    .btn-primary {
      background: #2b7a4b;
      color: white;
      box-shadow: 0 2px 6px rgba(43, 122, 75, 0.2);
    }
    .btn-primary:hover {
      background: #21693f;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: #f0f2f4;
      color: #3c5e4c;
    }
    .filter-bar {
      display: flex;
      gap: 12px;
      background: #ffffffcc;
      backdrop-filter: blur(2px);
      border-radius: 60px;
      padding: 4px;
      margin-bottom: 1rem;
    }
    .filter-btn {
      background: transparent;
      border-radius: 40px;
      padding: 8px 20px;
      font-weight: 500;
      color: #4f6e5e;
    }
    .filter-btn.active {
      background: #2b7a4b;
      color: white;
    }
    .entries-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .meal-item {
      background: #ffffff;
      border-radius: 24px;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border: 1px solid #ecf3ef;
    }
    .meal-info {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 12px;
      row-gap: 8px;
      flex: 3;
    }
    .meal-time {
      font-weight: 600;
      background: #f0f6f2;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.75rem;
      color: #2d6a47;
    }
    .meal-product {
      font-weight: 700;
      font-size: 1rem;
      color: #1f3e30;
    }
    .meal-amount {
      background: #fef7e0;
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #a9772c;
    }
    .reaction-badge {
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .reaction-good {
      background: #e0f3e4;
      color: #1f6e42;
    }
    .reaction-bad {
      background: #fee9e5;
      color: #c55a4a;
    }
    .meal-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .action-icon {
      background: transparent;
      padding: 6px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.1s;
      color: #8ba393;
    }
    .action-icon:hover {
      background: #eef2ef;
      color: #2b7a4b;
    }
    .product-list {
      margin-top: 12px;
    }
    .product-category {
      margin-bottom: 20px;
    }
    .product-category h4 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .product-tag {
      display: inline-block;
      background: #f1f5f9;
      border-radius: 40px;
      padding: 6px 14px;
      margin: 0 8px 8px 0;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .product-tag.good {
      background: #e1f3e6;
      color: #226e44;
      border-left: 3px solid #2b7a4b;
    }
    .product-tag.bad {
      background: #ffe6e2;
      color: #bc5a4a;
      border-left: 3px solid #d96c5e;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      background: #fefef9;
      border-radius: 48px;
      color: #86a394;
    }
    footer {
      text-align: center;
      font-size: 0.7rem;
      color: #98afa2;
      margin-top: 30px;
    }
    hr {
      margin: 12px 0;
      border: 0;
      height: 1px;
      background: #e2ece6;
    }
    @media (max-width: 760px) {
      .two-columns {
        flex-direction: column;
      }
      .form-grid .input-group {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- шапка -->
  <div class="card" style="padding-bottom: 1.2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
      <div>
        <h1><i class="fas fa-baby-carriage"></i> ПрикормТрекер+</h1>
        <div class="subhead">Реакция на новые продукты + списки «можно / нельзя»</div>
      </div>
      <div class="stats-row" id="statsArea"></div>
    </div>
  </div>

  <!-- форма добавления / редактирования -->
  <div class="card">
    <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 16px;">
      <i class="fas fa-utensils" style="color:#479f6e;"></i>
      <span style="font-weight: 600;">Запись прикорма</span>
    </div>
    <div class="form-grid">
      <div class="input-group"><label>Дата</label><input type="date" id="feedDate"></div>
      <div class="input-group"><label>Время</label><input type="time" id="feedTime"></div>
      <div class="input-group"><label>Продукт</label><input type="text" id="productName" placeholder="брокколи, каша, яблоко"></div>
      <div class="input-group"><label>Кол-во</label><input type="number" id="amountVal" step="0.5" value="0" min="0"></div>
      <div class="input-group"><label>Ед.</label><select id="unitSelect"><option value="г">г</option><option value="мл">мл</option><option value="ложка">ложка</option><option value="шт">шт</option></select></div>
      <div class="input-group">
        <label>Реакция ребенка</label>
        <div class="reaction-group">
          <label class="reaction-option good-label"><input type="radio" name="reaction" value="good" checked> <i class="fas fa-smile-wink"></i> Хорошо</label>
          <label class="reaction-option bad-label"><input type="radio" name="reaction" value="bad"> <i class="fas fa-frown"></i> Плохо</label>
        </div>
      </div>
    </div>
    <div class="button-group">
      <button id="submitBtn" class="btn-primary"><i class="fas fa-save"></i> Добавить</button>
      <button id="cancelEditBtn" class="btn-secondary" style="display: none;"><i class="fas fa-times"></i> Отмена</button>
      <button id="clearAllBtn" class="btn-secondary" style="margin-left: auto;"><i class="fas fa-trash-alt"></i> Очистить всё</button>
    </div>
  </div>

  <!-- две колонки: список и сводка по продуктам -->
  <div class="two-columns">
    <div class="left-col">
      <div class="filter-bar">
        <button data-filter="today" class="filter-btn active" id="filterTodayBtn"><i class="fas fa-sun"></i> Сегодня</button>
        <button data-filter="all" class="filter-btn" id="filterAllBtn"><i class="fas fa-list"></i> Все записи</button>
      </div>
      <div class="card" style="padding: 1rem 1rem 1.2rem 1rem;">
        <div style="margin-bottom: 16px;"><i class="fas fa-history"></i> История прикорма</div>
        <div id="entriesContainer" class="entries-list"></div>
      </div>
    </div>
    <div class="right-col">
      <div class="card">
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 12px;">
          <i class="fas fa-clipboard-list" style="color:#3e9f6b;"></i>
          <span style="font-weight: 700;">Сводка по продуктам</span>
        </div>
        <div id="productsSummary">
          <!-- Динамически: можно / нельзя -->
        </div>
        <hr>
        <div class="subhead" style="font-size: 0.7rem;"><i class="fas fa-lightbulb"></i> Если была хоть одна плохая реакция — продукт попадает в «нельзя».</div>
      </div>
    </div>
  </div>
  <footer><i class="fas fa-heart"></i> Оценка реакции помогает видеть безопасные продукты</footer>
</div>

<script>
  const STORAGE_KEY = "baby_solid_food_tracker_v2";

  let feedingEntries = [];
  let currentEditId = null;
  let currentFilter = "today";

  // DOM
  const dateInput = document.getElementById("feedDate");
  const timeInput = document.getElementById("feedTime");
  const productInput = document.getElementById("productName");
  const amountInput = document.getElementById("amountVal");
  const unitSelect = document.getElementById("unitSelect");
  const reactionRadios = document.querySelectorAll('input[name="reaction"]');
  const submitBtn = document.getElementById("submitBtn");
  const cancelEditBtn = document.getElementById("cancelEditBtn");
  const clearAllBtn = document.getElementById("clearAllBtn");
  const entriesContainer = document.getElementById("entriesContainer");
  const statsArea = document.getElementById("statsArea");
  const filterTodayBtn = document.getElementById("filterTodayBtn");
  const filterAllBtn = document.getElementById("filterAllBtn");
  const productsSummaryDiv = document.getElementById("productsSummary");

  // helpers
  function getTodayDateString() {
    const today = new Date();
    return today.toISOString().slice(0,10);
  }
  function getCurrentTimeString() {
    return new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', hour12: false });
  }
  function formatDisplayDate(dateStr) {
    if (!dateStr) return "";
    if (dateStr === getTodayDateString()) return "Сегодня";
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    if (dateStr === yesterday.toISOString().slice(0,10)) return "Вчера";
    const [y,m,d] = dateStr.split("-");
    return `${d}.${m}.${y}`;
  }

  function persistData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(feedingEntries)); }

  function loadInitialData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      feedingEntries = JSON.parse(stored);
      // миграция: добавить поле reaction если отсутствует
      feedingEntries = feedingEntries.map(entry => ({
        ...entry,
        reaction: entry.reaction || (entry.reaction === undefined ? 'good' : entry.reaction)
      }));
    } else {
      const today = getTodayDateString();
      const yesterday = (() => { let d = new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();
      feedingEntries = [
        { id: Date.now()+1, date: today, time: "09:30", product: "Кабачковое пюре", amount: 25, unit: "г", reaction: "good" },
        { id: Date.now()+2, date: today, time: "12:15", product: "Яблоко", amount: 30, unit: "г", reaction: "good" },
        { id: Date.now()+3, date: yesterday, time: "17:45", product: "Безмолочная каша", amount: 45, unit: "г", reaction: "good" },
        { id: Date.now()+4, date: yesterday, time: "11:20", product: "Брокколи", amount: 20, unit: "г", reaction: "bad" }
      ];
      persistData();
    }
  }

  function getSelectedReaction() {
    let val = 'good';
    for (let radio of reactionRadios) if (radio.checked) { val = radio.value; break; }
    return val;
  }
  function setSelectedReaction(value) {
    for (let radio of reactionRadios) if (radio.value === value) radio.checked = true;
  }

  function updateStatistics() {
    const todayStr = getTodayDateString();
    const todayEntries = feedingEntries.filter(e => e.date === todayStr);
    statsArea.innerHTML = `<div class="stat-badge"><i class="fas fa-calendar-day"></i> Сегодня: ${todayEntries.length}</div>
                           <div class="stat-badge"><i class="fas fa-database"></i> Всего: ${feedingEntries.length}</div>`;
  }

  // Генерация списка продуктов (можно / нельзя)
  function updateProductsSummary() {
    const productMap = new Map(); // key: product name (lowercase) -> { goodCount, badCount, originalName }
    feedingEntries.forEach(entry => {
      const name = entry.product.trim();
      if (!name) return;
      const key = name.toLowerCase();
      if (!productMap.has(key)) productMap.set(key, { goodCount: 0, badCount: 0, originalName: name });
      const item = productMap.get(key);
      if (entry.reaction === 'good') item.goodCount++;
      else item.badCount++;
    });
    const goodProducts = [];
    const badProducts = [];
    for (let [_, data] of productMap.entries()) {
      if (data.badCount > 0) badProducts.push(data.originalName);
      else if (data.goodCount > 0) goodProducts.push(data.originalName);
    }
    goodProducts.sort((a,b)=>a.localeCompare(b));
    badProducts.sort((a,b)=>a.localeCompare(b));
    let html = `<div class="product-category"><h4><i class="fas fa-check-circle" style="color:#2b7a4b;"></i> Можно (нет плохой реакции)</h4>`;
    if (goodProducts.length) html += `<div>${goodProducts.map(p => `<span class="product-tag good">${escapeHtml(p)}</span>`).join('')}</div>`;
    else html += `<div class="empty-state" style="padding:12px; font-size:0.8rem;">Пока нет продуктов с хорошей реакцией</div>`;
    html += `</div><div class="product-category"><h4><i class="fas fa-exclamation-triangle" style="color:#c46b5e;"></i> Нельзя (была плохая реакция)</h4>`;
    if (badProducts.length) html += `<div>${badProducts.map(p => `<span class="product-tag bad">${escapeHtml(p)}</span>`).join('')}</div>`;
    else html += `<div class="empty-state" style="padding:12px; font-size:0.8rem;">Нет запрещённых продуктов</div>`;
    html += `</div>`;
    productsSummaryDiv.innerHTML = html;
  }

  function getFilteredSortedEntries() {
    let filtered = [...feedingEntries];
    if (currentFilter === "today") filtered = filtered.filter(e => e.date === getTodayDateString());
    filtered.sort((a,b) => (b.date + "T" + b.time).localeCompare(a.date + "T" + a.time));
    return filtered;
  }

  function renderFeedList() {
    const list = getFilteredSortedEntries();
    if (!list.length) {
      entriesContainer.innerHTML = `<div class="empty-state"><i class="fas fa-info-circle"></i> ${currentFilter === "today" ? "Сегодня нет записей" : "Нет записей о прикорме"}</div>`;
      return;
    }
    entriesContainer.innerHTML = list.map(entry => {
      const reactionClass = entry.reaction === 'good' ? 'reaction-good' : 'reaction-bad';
      const reactionIcon = entry.reaction === 'good' ? '<i class="fas fa-smile-wink"></i>' : '<i class="fas fa-frown"></i>';
      const reactionText = entry.reaction === 'good' ? 'хорошо' : 'плохо';
      return `
        <div class="meal-item" data-id="${entry.id}">
          <div class="meal-info">
            <span class="meal-time">${escapeHtml(entry.time)}</span>
            <span class="meal-product">${escapeHtml(entry.product)}</span>
            ${(entry.amount && entry.amount>0) ? `<span class="meal-amount">${entry.amount} ${entry.unit}</span>` : ''}
            <span class="reaction-badge ${reactionClass}">${reactionIcon} ${reactionText}</span>
            <span class="meal-date">${formatDisplayDate(entry.date)}</span>
          </div>
          <div class="meal-actions">
            <span class="action-icon edit-action" data-id="${entry.id}" title="Редактировать"><i class="fas fa-pen"></i></span>
            <span class="action-icon delete" data-id="${entry.id}" title="Удалить"><i class="fas fa-trash-can"></i></span>
          </div>
        </div>
      `;
    }).join('');
    document.querySelectorAll('.edit-action').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); startEditEntry(Number(btn.dataset.id)); }));
    document.querySelectorAll('.action-icon.delete').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); deleteEntryById(Number(btn.dataset.id)); }));
  }

  function startEditEntry(id) {
    const entry = feedingEntries.find(e => e.id === id);
    if (!entry) return;
    currentEditId = id;
    dateInput.value = entry.date;
    timeInput.value = entry.time;
    productInput.value = entry.product;
    amountInput.value = entry.amount;
    unitSelect.value = entry.unit;
    setSelectedReaction(entry.reaction);
    submitBtn.innerHTML = '<i class="fas fa-pen"></i> Обновить';
    cancelEditBtn.style.display = 'inline-flex';
    document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
  }

  function addNewEntry() {
    const dateVal = dateInput.value;
    const timeVal = timeInput.value;
    const productVal = productInput.value.trim();
    let amountVal = parseFloat(amountInput.value);
    const unitVal = unitSelect.value;
    const reactionVal = getSelectedReaction();
    if (!dateVal || !timeVal || !productVal) { alert("Заполните дату, время и продукт"); return; }
    if (isNaN(amountVal) || amountVal < 0) amountVal = 0;
    const newEntry = { id: Date.now(), date: dateVal, time: timeVal, product: productVal, amount: amountVal, unit: unitVal, reaction: reactionVal };
    feedingEntries.push(newEntry);
    persistData();
    resetFormAndEditing();
    renderAllAndStats();
  }

  function updateCurrentEntry() {
    if (!currentEditId) return;
    const dateVal = dateInput.value;
    const timeVal = timeInput.value;
    const productVal = productInput.value.trim();
    let amountVal = parseFloat(amountInput.value);
    const unitVal = unitSelect.value;
    const reactionVal = getSelectedReaction();
    if (!dateVal || !timeVal || !productVal) { alert("Заполните дату, время и продукт"); return; }
    if (isNaN(amountVal) || amountVal < 0) amountVal = 0;
    const index = feedingEntries.findIndex(e => e.id === currentEditId);
    if (index !== -1) {
      feedingEntries[index] = { ...feedingEntries[index], date: dateVal, time: timeVal, product: productVal, amount: amountVal, unit: unitVal, reaction: reactionVal };
      persistData();
    }
    resetFormAndEditing();
    renderAllAndStats();
  }

  function deleteEntryById(id) {
    if (confirm("Удалить запись?")) {
      feedingEntries = feedingEntries.filter(e => e.id !== id);
      if (currentEditId === id) resetFormAndEditing();
      persistData();
      renderAllAndStats();
    }
  }

  function clearAllData() {
    if (confirm("Удалить ВСЕ записи?")) { feedingEntries = []; persistData(); resetFormAndEditing(); renderAllAndStats(); }
  }

  function resetFormAndEditing() {
    currentEditId = null;
    dateInput.value = getTodayDateString();
    timeInput.value = getCurrentTimeString();
    productInput.value = "";
    amountInput.value = "0";
    unitSelect.value = "г";
    setSelectedReaction('good');
    submitBtn.innerHTML = '<i class="fas fa-save"></i> Добавить';
    cancelEditBtn.style.display = 'none';
  }

  function setFilter(mode) {
    currentFilter = mode;
    if (mode === "today") { filterTodayBtn.classList.add("active"); filterAllBtn.classList.remove("active"); }
    else { filterAllBtn.classList.add("active"); filterTodayBtn.classList.remove("active"); }
    renderFeedList();
  }

  function renderAllAndStats() {
    updateStatistics();
    updateProductsSummary();
    renderFeedList();
  }

  function bindEvents() {
    submitBtn.onclick = () => { if (currentEditId !== null) updateCurrentEntry(); else addNewEntry(); };
    cancelEditBtn.onclick = resetFormAndEditing;
    clearAllBtn.onclick = clearAllData;
    filterTodayBtn.onclick = () => setFilter("today");
    filterAllBtn.onclick = () => setFilter("all");
  }

  function init() {
    loadInitialData();
    dateInput.value = getTodayDateString();
    timeInput.value = getCurrentTimeString();
    setSelectedReaction('good');
    bindEvents();
    setFilter("today");
    renderAllAndStats();
  }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  init();
</script>
</body>
</html>
